backend:
  name: github
  repo: ZSFan888/Blog
  branch: main
  # 使用 CF Pages Functions 处理 OAuth，无需独立后端服务
  base_url: https://blog.pages.dev
  auth_endpoint: api/auth

# 图片上传到 public/posts-img/
media_folder: public/posts-img
public_folder: /posts-img

collections:
  - name: posts
    label: 文章
    label_singular: 文章
    folder: posts
    create: true
    delete: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{title}} — {{date}}"
    sort_field: date
    sort_direction: Descending
    fields:
      - label: 文章 ID
        name: id
        widget: string
        hint: "URL 路径，只能用英文、数字、连字符，如 my-first-post"
        pattern: ['^[a-zA-Z0-9-]+$', "只能包含英文字母、数字和连字符"]

      - label: 标题
        name: title
        widget: string

      - label: 摘要
        name: excerpt
        widget: text
        hint: "用于文章列表展示和 SEO，建议 50~120 字"

      - label: 发布日期
        name: date
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false

      - label: 更新日期
        name: updatedAt
        widget: datetime
        format: YYYY-MM-DD
        date_format: YYYY-MM-DD
        time_format: false
        required: false

      - label: 分类
        name: category
        widget: select
        options: [教程, 技术, 随笔, 分享, 其他]
        default: 其他

      - label: 标签
        name: tags
        widget: list
        required: false
        hint: "多个标签，回车分隔"

      - label: 封面图
        name: coverImage
        widget: image
        required: false
        hint: "建议尺寸 1200x630px"

      - label: 置顶排序
        name: top
        widget: number
        required: false
        hint: "数字越小越靠前，不填则不置顶"

      - label: 首页精选
        name: featured
        widget: boolean
        default: false
        required: false

      - label: 草稿
        name: draft
        widget: boolean
        default: false
        required: false
        hint: "草稿不会出现在博客中"

      - label: 正文
        name: body
        widget: markdown
        hint: "支持 GFM 表格、代码高亮、KaTeX 数学公式、Mermaid 图表"

  - name: friends
    label: 友情链接
    label_singular: 友链
    folder: friends
    create: true
    delete: true
    format: json
    slug: "{{fields.name}}"
    identifier_field: name
    summary: "{{name}} — {{url}}"
    fields:
      - label: 名称
        name: name
        widget: string
      - label: 描述
        name: description
        widget: string
      - label: 头像
        name: avatar
        widget: string
        hint: "头像图片 URL"
      - label: 网址
        name: url
        widget: string
        hint: "完整 URL，如 https://example.com"
