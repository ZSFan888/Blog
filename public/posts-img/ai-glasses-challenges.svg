<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#071119"/><text x="100" y="120" font-size="60" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">为什么还没彻底爆发</text><rect x="140" y="220" width="1320" height="520" rx="28" fill="#101e30" stroke="#42c6ff"/><text x="190" y="340" font-size="40" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#79f1ca">续航、隐私、生态、标准，四道门槛一个都没消失</text><text x="190" y="450" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">多数产品续航仅 6-8 小时，摄像和麦克风持续采集也让隐私焦虑始终存在</text><text x="190" y="560" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">它已经越过“没用”的阶段，但还没越过“离不开”的阶段</text></svg>