<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="820" rx="28" fill="#0F172A"/>
  <text x="70" y="92" fill="#E2E8F0" font-size="48" font-family="Segoe UI, Arial, sans-serif" font-weight="700">虚拟机 vs 容器</text>
  <text x="70" y="138" fill="#94A3B8" font-size="26" font-family="Segoe UI, Arial, sans-serif">同样是隔离环境，但开销、启动速度和密度完全不是一个量级</text>

  <rect x="70" y="190" width="560" height="560" rx="24" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="770" y="190" width="560" height="560" rx="24" fill="#111827" stroke="#0EA5E9" stroke-width="2"/>
  <text x="292" y="245" fill="#CBD5E1" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">虚拟机</text>
  <text x="1000" y="245" fill="#BAE6FD" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">容器</text>

  <rect x="115" y="290" width="470" height="92" rx="18" fill="#1E293B"/>
  <text x="290" y="346" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">App A</text>
  <rect x="115" y="400" width="470" height="92" rx="18" fill="#1E293B"/>
  <text x="290" y="456" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">App B</text>
  <rect x="115" y="510" width="470" height="92" rx="18" fill="#334155"/>
  <text x="235" y="566" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">Guest OS / Kernel</text>
  <rect x="115" y="620" width="470" height="86" rx="18" fill="#475569"/>
  <text x="256" y="673" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif">Hypervisor + Host</text>

  <rect x="815" y="290" width="470" height="92" rx="18" fill="#0F766E"/>
  <text x="990" y="346" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">App A</text>
  <rect x="815" y="400" width="470" height="92" rx="18" fill="#0891B2"/>
  <text x="990" y="456" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">App B</text>
  <rect x="815" y="510" width="470" height="92" rx="18" fill="#1D4ED8"/>
  <text x="905" y="566" fill="#F8FAFC" font-size="32" font-family="Segoe UI, Arial, sans-serif">Docker Engine + Host Kernel</text>
  <rect x="815" y="620" width="470" height="86" rx="18" fill="#1E40AF"/>
  <text x="972" y="673" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif">Host OS</text>

  <text x="130" y="730" fill="#94A3B8" font-size="24" font-family="Segoe UI, Arial, sans-serif">每个实例都带一套完整 Guest OS，资源占用更高</text>
  <text x="824" y="730" fill="#7DD3FC" font-size="24" font-family="Segoe UI, Arial, sans-serif">共享宿主机内核，启动更快、部署更轻、更适合应用交付</text>
</svg>