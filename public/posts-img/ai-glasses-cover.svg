<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#09111f"/><text x="100" y="220" font-size="76" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">AI 眼镜开始像样了</text><text x="100" y="330" font-size="82" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#79f1ca" font-weight="700">因为它终于在争夺“日常入口”</text><text x="100" y="430" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#d8efff">关键词：随身助手、碎片化操作、轻量化、翻译、导航、支付</text></svg>