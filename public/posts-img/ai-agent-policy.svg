<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#071119"/><text x="100" y="120" font-size="60" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">政策与落地同时加速</text><rect x="140" y="220" width="1320" height="520" rx="28" fill="#101e30" stroke="#42c6ff"/><text x="200" y="330" font-size="40" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#69f0c7">北京、上海等地支持通用智能体发展</text><text x="200" y="420" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e5f2ff">到 2025 年底：3-5 个基础大模型、100 个行业大模型、1000 个行业案例</text><text x="200" y="510" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e5f2ff">标杆应用支持最高 5000 万元，模型券年度兑付总额不超过 1 亿元</text><text x="200" y="600" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e5f2ff">问题是：跑得快的落地，还需要跟得上的标准、安全和责任边界</text></svg>