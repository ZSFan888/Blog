<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#0b1020"/><text x="110" y="220" font-size="78" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">具身智能真正开始难了</text><text x="110" y="330" font-size="82" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#72f5ca" font-weight="700">因为它要从“会动”变成“会干活”</text><text x="110" y="430" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#d6ecff">关键词：人形机器人、产业化、训练数据、工业场景、工程师红利</text></svg>