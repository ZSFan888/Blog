<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#081018"/><text x="100" y="120" font-size="60" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">中国制造的底气</text><rect x="120" y="220" width="1360" height="520" rx="28" fill="#101e30" stroke="#42c6ff"/><text x="180" y="330" font-size="40" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#72f5ca">完整供应链 + 工业机器人基础 + 工程师规模</text><text x="180" y="430" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">工业机器人年销量超 29 万台，机器人工程本科专业已超过 300 所高校开设</text><text x="180" y="520" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">真正可能先产业化落地的地方，不一定是故事讲得最动人的地方，而是产线、仓储和特种作业现场。</text></svg>