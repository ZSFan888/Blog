<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#0a1322"/><text x="100" y="190" font-size="72" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#79f1ca" font-weight="700">AI 眼镜不一定先替代手机，</text><text x="100" y="300" font-size="72" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#79f1ca" font-weight="700">但很可能先减少你掏手机的次数。</text><text x="100" y="460" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#dcefff">这就是它开始像“下一代日常入口”的原因。</text></svg>