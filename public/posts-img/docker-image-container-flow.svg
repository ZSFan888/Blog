<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="820" rx="28" fill="#0B1220"/>
  <text x="70" y="90" fill="#E2E8F0" font-size="48" font-family="Segoe UI, Arial, sans-serif" font-weight="700">镜像、容器与仓库的关系</text>
  <text x="70" y="136" fill="#94A3B8" font-size="26" font-family="Segoe UI, Arial, sans-serif">很多新手卡在这：镜像是模板，容器是运行中的实例，仓库是分发中心</text>

  <rect x="80" y="220" width="310" height="420" rx="26" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="170" y="282" fill="#67E8F9" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Dockerfile</text>
  <rect x="130" y="332" width="210" height="52" rx="14" fill="#1E40AF"/>
  <text x="180" y="367" fill="#FFFFFF" font-size="24" font-family="Consolas, monospace">FROM node:20</text>
  <rect x="130" y="402" width="210" height="52" rx="14" fill="#1E3A8A"/>
  <text x="174" y="437" fill="#FFFFFF" font-size="24" font-family="Consolas, monospace">COPY . /app</text>
  <rect x="130" y="472" width="210" height="52" rx="14" fill="#1D4ED8"/>
  <text x="166" y="507" fill="#FFFFFF" font-size="24" font-family="Consolas, monospace">RUN npm ci</text>
  <rect x="130" y="542" width="210" height="52" rx="14" fill="#2563EB"/>
  <text x="170" y="577" fill="#FFFFFF" font-size="24" font-family="Consolas, monospace">CMD [\"node\"]</text>

  <rect x="545" y="220" width="310" height="420" rx="26" fill="#111827" stroke="#60A5FA" stroke-width="2"/>
  <text x="638" y="282" fill="#93C5FD" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700">镜像</text>
  <rect x="610" y="340" width="180" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="663" y="372" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif">Layer 3</text>
  <rect x="590" y="398" width="220" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="663" y="430" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif">Layer 2</text>
  <rect x="570" y="456" width="260" height="48" rx="14" fill="#0F172A" stroke="#334155"/>
  <text x="663" y="488" fill="#E2E8F0" font-size="22" font-family="Segoe UI, Arial, sans-serif">Layer 1</text>
  <rect x="610" y="532" width="180" height="60" rx="16" fill="#1D4ED8"/>
  <text x="635" y="571" fill="#FFFFFF" font-size="26" font-family="Segoe UI, Arial, sans-serif">myapp:1.0</text>

  <rect x="1010" y="220" width="310" height="420" rx="26" fill="#111827" stroke="#22D3EE" stroke-width="2"/>
  <text x="1102" y="282" fill="#67E8F9" font-size="36" font-family="Segoe UI, Arial, sans-serif" font-weight="700">容器</text>
  <rect x="1060" y="340" width="210" height="86" rx="18" fill="#0F766E"/>
  <text x="1110" y="392" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">myapp-1</text>
  <rect x="1060" y="448" width="210" height="86" rx="18" fill="#0891B2"/>
  <text x="1110" y="500" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">myapp-2</text>
  <text x="1072" y="585" fill="#94FDF4" font-size="24" font-family="Segoe UI, Arial, sans-serif">多个容器可基于同一镜像启动</text>

  <path d="M410 430H520" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round"/>
  <path d="M498 410L540 430L498 450" fill="none" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="430" y="398" fill="#93C5FD" font-size="24" font-family="Segoe UI, Arial, sans-serif">docker build</text>

  <path d="M875 430H985" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>
  <path d="M963 410L1005 430L963 450" fill="none" stroke="#67E8F9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="902" y="398" fill="#67E8F9" font-size="24" font-family="Segoe UI, Arial, sans-serif">docker run</text>
</svg>