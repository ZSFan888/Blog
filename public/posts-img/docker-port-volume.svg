<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="820" rx="28" fill="#0B1220"/>
  <text x="70" y="92" fill="#E2E8F0" font-size="48" font-family="Segoe UI, Arial, sans-serif" font-weight="700">端口映射与数据卷</text>
  <text x="70" y="138" fill="#94A3B8" font-size="26" font-family="Segoe UI, Arial, sans-serif">容器不是黑盒：端口负责对外访问，卷负责持久化数据</text>

  <rect x="100" y="220" width="520" height="500" rx="26" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="215" y="284" fill="#67E8F9" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">端口映射</text>
  <rect x="160" y="370" width="150" height="90" rx="18" fill="#334155"/>
  <text x="192" y="425" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">主机</text>
  <rect x="410" y="340" width="150" height="150" rx="22" fill="#1D4ED8"/>
  <text x="445" y="428" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">容器</text>
  <path d="M310 415H390" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round"/>
  <path d="M368 395L408 415L368 435" fill="none" stroke="#7DD3FC" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="205" y="530" fill="#BFDBFE" font-size="28" font-family="Consolas, monospace">-p 8080:80</text>
  <text x="156" y="590" fill="#94A3B8" font-size="24" font-family="Segoe UI, Arial, sans-serif">把宿主机 8080 转发给容器 80 端口</text>

  <rect x="760" y="220" width="540" height="500" rx="26" fill="#111827" stroke="#22D3EE" stroke-width="2"/>
  <text x="930" y="284" fill="#67E8F9" font-size="38" font-family="Segoe UI, Arial, sans-serif" font-weight="700">数据卷</text>
  <rect x="820" y="360" width="170" height="100" rx="18" fill="#475569"/>
  <text x="865" y="420" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">主机目录</text>
  <rect x="1080" y="340" width="160" height="150" rx="22" fill="#0891B2"/>
  <text x="1118" y="428" fill="#FFFFFF" font-size="30" font-family="Segoe UI, Arial, sans-serif">容器</text>
  <path d="M990 415H1060" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>
  <path d="M1038 395L1078 415L1038 435" fill="none" stroke="#67E8F9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="844" y="545" fill="#BAE6FD" font-size="28" font-family="Consolas, monospace">-v ./data:/var/lib/postgresql/data</text>
  <text x="844" y="605" fill="#94FDF4" font-size="24" font-family="Segoe UI, Arial, sans-serif">容器删了，卷里的数据还在，这就是持久化的意义</text>
</svg>