<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#0b1220"/><text x="110" y="220" font-size="78" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">AI 智能体爆火之后</text><text x="110" y="330" font-size="82" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#69f0c7" font-weight="700">真正难的是“放心放手”</text><text x="110" y="430" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#d6ecff">关键词：执行能力、提示词注入、权限边界、可追溯治理</text><rect x="110" y="520" width="1380" height="220" rx="30" fill="#101d31" stroke="#41c3ff"/><text x="160" y="610" font-size="42" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff">会做事的 AI，风险已经不只是“答错题”，而是“做错事”。</text></svg>