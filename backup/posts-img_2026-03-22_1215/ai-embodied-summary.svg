<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#0a1322"/><text x="100" y="180" font-size="72" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#72f5ca" font-weight="700">机器人要先成为工友，</text><text x="100" y="300" font-size="72" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#72f5ca" font-weight="700">才有资格谈成为家人。</text><text x="100" y="470" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#dcefff">这也是为什么短期看工业场景，长期才看家庭场景。</text></svg>