<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900"><rect width="1600" height="900" fill="#071119"/><text x="100" y="120" font-size="60" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#fff" font-weight="700">政策正在把 AI 制药往产业化推</text><rect x="140" y="220" width="1320" height="520" rx="28" fill="#101e30" stroke="#42c6ff"/><text x="190" y="340" font-size="40" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#77f3c9">到 2027 年：30+ 标准、100+ 产品、100+ 场景、100+ 数智药械工厂、10+ 医药大模型平台</text><text x="190" y="450" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">医疗卫生意见同时提出：建立高质量数据集、可信数据空间、形成专病垂直大模型和智能体应用</text><text x="190" y="560" font-size="34" font-family="Segoe UI, Microsoft YaHei, Arial" fill="#e4f1ff">关键动作：开发新药筛选模型，加速新药智能研发</text></svg>